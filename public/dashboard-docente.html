<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Docente | Sistema Escuela</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/usuarios.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <header class="sidebar__header">
            <div class="brand"><div class="brand__mark">SE</div></div>
        </header>
        <nav class="nav">
            <a href="#" class="nav__link nav__link--active">👨‍🏫 Alumnos</a>
            <a href="login.html" class="nav__link" onclick="localStorage.clear()" style="margin-top: auto;">🚪 Salir</a>
        </nav>
    </aside>

    <main class="main">
        <header class="main__header">
            <h1>Gestión de Calificaciones</h1>
            <p class="muted">Lista de alumnos inscritos en tu grupo asignado.</p>
        </header>

        <section class="table-wrap" style="margin-top: 20px;">
            <table class="table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre del Alumno</th>
                    <th>Calificación</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody id="tabla-alumnos"></tbody>
            </table>
        </section>
    </main>
</div>

<div id="modalCalificar" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); place-items:center; z-index:1000;">
    <div class="card" style="max-width:400px; width:90%;">
        <div class="form">
            <h3 class="brand__name">Asignar Nota</h3>
            <input type="hidden" id="input-inscripcion">
            <div class="field">
                <label class="field__label">Calificación (0-100)</label>
                <input type="number" id="input-nota" class="field__input">
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn--primary" onclick="enviarCalificacion()" style="flex:1">Guardar</button>
                <button class="btn" onclick="cerrarModal()" style="flex:1">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<script src="js/docente.js"></script>
</body>
</html>
