<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Docente | Sistema Escuela</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/usuarios.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand__mark">SE</div>
            <div>
                <div class="brand__name">Sistema Escuela</div>
                <div class="brand__tag">Panel Docente</div>
            </div>
        </div>

        <nav class="menu">
            <a class="menu__item" href="dashboard-docente.html">Gestión Alumnos</a>
        </nav>

        <div class="sidebar__footer">
            <button id="logoutBtn" class="btn btn-danger" type="button" onclick="localStorage.clear(); window.location.href='login.html'">
                Cerrar sesión
            </button>
        </div>
    </aside>

    <main class="main">
        <header class="main__header">
            <h1>Gestión de Calificaciones</h1>
            <p class="muted">Lista de alumnos inscritos en tu grupo asignado.</p>
        </header>

        <section class="table-wrap" style="margin-top: 20px;">
            <table class="table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre del Alumno</th>
                    <th>Calificación</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody id="tabla-alumnos"></tbody>
            </table>
        </section>
    </main>
</div>

<script src="js/docente.js"></script>
</body>
</html>
